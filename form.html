<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Registration Form</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Georgia, 'Times New Roman', Times, serif;
    }

    body{
      background:#f4f4f4;
      padding:40px;
    }

    .container{
      width:80%;
      margin:auto;
    }

    h1{
      text-align:center;
      color:darkblue;
      margin-bottom:40px;
      font-size:55px;
      font-weight:bold;
    }

    form{
      width:100%;
    }

    .form-group{
      margin-bottom:25px;
    }

    label{
      display:block;
      font-size:20px;
      font-weight:bold;
      margin-bottom:10px;
    }

    input,
    select,
    textarea{
      width:100%;
      padding:15px;
      border:1px solid #999;
      border-radius:5px;
      font-size:18px;
      outline:none;
    }

    textarea{
      resize:none;
      height:120px;
    }

    .gender{
      display:flex;
      align-items:center;
      gap:25px;
      margin-top:10px;
    }

    .gender label{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:18px;
      font-weight:normal;
    }

    .gender input{
      width:auto;
    }

    .btn{
      margin-top:10px;
      padding:12px 28px;
      background:darkblue;
      color:white;
      border:none;
      border-radius:5px;
      font-size:20px;
      cursor:pointer;
    }

    .btn:hover{
      background:navy;
    }

    h2{
      text-align:center;
      color:darkblue;
      margin:60px 0 30px;
      font-size:48px;
      font-weight:bold;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:white;
    }

    table th,
    table td{
      border:1px solid #333;
      padding:18px;
      text-align:center;
      font-size:18px;
    }

    table th{
      background:darkblue;
      color:white;
      font-size:22px;
    }

    table tr:nth-child(even){
      background:#f9f9f9;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Student Registration Form</h1>

    <form>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" placeholder="Enter your name">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="Enter your email">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="Enter password">
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" placeholder="Enter phone number">
      </div>

      <div class="form-group">
        <label>Date of Birth</label>
        <input type="date">
      </div>

      <div class="form-group">
        <label>Select Course</label>

        <select>
          <option>HTML</option>
          <option>CSS</option>
          <option>JavaScript</option>
          <option>React</option>
        </select>
      </div>

      <div class="form-group">
        <label>Gender</label>

        <div class="gender">
          <label>
            <input type="radio" name="gender">
            Male
          </label>

          <label>
            <input type="radio" name="gender">
            Female
          </label>
        </div>
      </div>

      <div class="form-group">
        <label>Address</label>

        <textarea placeholder="Enter address"></textarea>
      </div>

      <button type="submit" class="btn">Register</button>

    </form>

    <h2>Student Data Table</h2>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Course</th>
          <th>City</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>1</td>
          <td>Rahul</td>
          <td>HTML</td>
          <td>Mumbai</td>
        </tr>

        <tr>
          <td>2</td>
          <td>Sneha</td>
          <td>CSS</td>
          <td>Pune</td>
        </tr>

        <tr>
          <td>3</td>
          <td>Amit</td>
          <td>JavaScript</td>
          <td>Nashik</td>
        </tr>

        <tr>
          <td>4</td>
          <td>Priya</td>
          <td>React</td>
          <td>Nagpur</td>
        </tr>
      </tbody>

    </table>

  </div>

</body>
</html>
