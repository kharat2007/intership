<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>List and table Example</title>
</head>
<body>

  <h2>Fruit List</h2>

  <ul>
    <li>Apple</li>
    <li>Banana</li>
    <li>Mango</li>
  </ul>
<html>
<head>
  <title>Table Example</title>
</head>
<body>

  <h2>Fruit Table</h2>

  <table border="1">
    <tr>
      <th>Fruit</th>
      <th>Color</th>
    </tr>
    <tr>
      <td>Apple</td>
      <td>Red</td>
    </tr>
    <tr>
      <td>Banana</td>
      <td>Yellow</td>
    </tr>
    <tr>
      <td>Mango</td>
      <td>Orange</td>
    </tr>
  </table>

</body>
</html>
