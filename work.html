<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>List and table Example</title>
  <style>
    table,th,td{
      background-color: aqua;
      color: blueviolet;
    }
  </style>
</head>
<body>

  <h2>Fruit List</h2>

  <ul>
    <li>Apple</li>
    <li>Banana</li>
    <li>Mango</li>
  </ul>
<html>
<head>
  <title>Table Example</title>
</head>
<body>

  <h2>Fruit Table</h2>

  <table border="1">
    <tr style="background-color: blue; color: blueviolet;">
      <th>Fruit</th>
      <th>Color</th>
    </tr>
    <tr>
      <td>Apple</td>
      <td>Red</td>
    </tr>
    <tr>
      <td>Banana</td>
      <td>Yellow</td>
    </tr>
    <tr>
      <td>Mango</td>
      <td>Orange</td>
    </tr>
  </table>
  <h3>
    <form>
        <label>Full Name</label>
        <input type="text" placeholder="Enter your name" required>

        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>

        <label>Password</label>
        <input type="password" placeholder="Enter password" required>

        <label>Gender</label>
        <select required>
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>

        <label>Course</label>
        <input type="text" placeholder="Enter course name">

        <label>Address</label>
        <textarea rows="4" placeholder="Enter address"></textarea>

        <button type="submit">Register</button>
    </form>
  </h3>

</body>
</html>
